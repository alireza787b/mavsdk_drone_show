name: Automated Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Manual version (e.g., 3.8) or leave empty for auto'
        required: false
        default: ''
      bump_type:
        description: 'Auto bump type if version empty'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - minor
          - major
      prerelease_tag:
        description: 'Optional beta tag from current main (for example v5.5.110-simurgh-operator-beta)'
        required: false
        default: ''

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate manual release ref
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_REF: ${{ github.ref }}
        run: |
          if [ "$RELEASE_REF" != "refs/heads/main" ]; then
            echo "Manual releases must run from the main branch; got $RELEASE_REF"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio pytest-cov pytest-mock pytest-timeout hypothesis

      - name: Validate generated contracts
        run: |
          python3 tools/generate_mds_env_reference.py --check
          python3 tools/generate_simurgh_tool_candidates.py --check
          python3 tools/generate_simurgh_docs_index.py --check
          python3 tools/audit_mds_env_registry.py

      - name: Run Simurgh and validation safety tests
        run: |
          pytest \
            tests/test_agent_action_intent.py \
            tests/test_agent_assistant_evals.py \
            tests/test_agent_assistant_runtime.py \
            tests/test_agent_action_planner.py \
            tests/test_agent_provider_smoke.py \
            tests/test_agent_query_understanding.py \
            tests/test_agent_registry_planner_coverage.py \
            tests/test_agent_turn_intent.py \
            tests/test_api_route_inventory.py \
            tests/test_env_registry.py \
            tests/test_gcs_simurgh_assistant.py \
            tests/test_gcs_simurgh_mcp.py \
            tests/test_gcs_simurgh_routes.py \
            tests/test_gcs_sitl_control_routes.py \
            tests/test_mds_auth.py \
            tests/test_mds_logging/test_log_proxy.py \
            tests/test_node_boot_status_routes.py \
            tests/test_run_sitl_validation_suite.py \
            tests/test_runtime_validation_support.py \
            tests/test_simurgh_dashboard_prompt_evals.py \
            tests/test_simurgh_action_runs.py \
            tests/test_simurgh_mcp_smoke_client.py \
            tests/test_simurgh_retrieval_quality.py \
            tests/test_simurgh_tool_candidate_generator.py \
            tests/test_sitl_control_service.py \
            tests/test_sitl_control_client.py
          python3 tools/run_simurgh_dashboard_prompt_evals.py
          python3 tools/run_simurgh_provider_smoke.py --expected-runtime-mode sitl --json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/dashboard/drone-dashboard/package-lock.json

      - name: Validate dashboard
        working-directory: app/dashboard/drone-dashboard
        run: |
          npm ci
          CI=true npm test -- --runInBand --watchAll=false --runTestsByPath \
            src/pages/SimurghOperatorPage.test.js \
            src/components/logs/OnboardUlogDialog.test.js \
            src/services/gcsApiService.test.js \
            src/config/routeDocs.test.js \
            src/components/SidebarMenu.test.js \
            src/App.test.js
          npm run build

  release:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    needs: quality-gates
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history for commit analysis
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install gitpython

      - name: Get current version
        id: current_version
        run: |
          CURRENT_VERSION=$(cat VERSION)
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "📌 Current version: $CURRENT_VERSION"

      - name: Bump version
        id: bump_version
        env:
          PRERELEASE_TAG_INPUT: ${{ github.event.inputs.prerelease_tag }}
          VERSION_INPUT: ${{ github.event.inputs.version }}
          BUMP_TYPE_INPUT: ${{ github.event.inputs.bump_type }}
        run: |
          if [ -n "$PRERELEASE_TAG_INPUT" ]; then
            echo "🧪 Publishing a prerelease without changing the X.Y product version"
          elif [ -n "$VERSION_INPUT" ]; then
            echo "🎯 Using manual version: $VERSION_INPUT"
            python3 tools/bump_version.py --manual "$VERSION_INPUT"
          else
            echo "🤖 Auto-detecting version bump from commits"
            python3 tools/bump_version.py --type "${BUMP_TYPE_INPUT:-auto}"
          fi

          NEW_VERSION=$(cat VERSION)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ New version: $NEW_VERSION"

      - name: Check if version changed
        id: version_check
        env:
          PRERELEASE_TAG_INPUT: ${{ github.event.inputs.prerelease_tag }}
        run: |
          OLD_VERSION="${{ steps.current_version.outputs.version }}"
          NEW_VERSION="${{ steps.bump_version.outputs.version }}"
          PRERELEASE_TAG="$PRERELEASE_TAG_INPUT"

          if [ -n "$PRERELEASE_TAG" ]; then
            IFS='.' read -r PRODUCT_MAJOR PRODUCT_MINOR PRODUCT_EXTRA <<< "$OLD_VERSION"
            if ! [[ "$PRODUCT_MAJOR" =~ ^[0-9]+$ && "$PRODUCT_MINOR" =~ ^[0-9]+$ && -z "$PRODUCT_EXTRA" ]]; then
              echo "❌ VERSION must contain exactly two numeric components (X.Y)"
              exit 1
            fi
            if ! [[ "$PRERELEASE_TAG" =~ ^v${PRODUCT_MAJOR}\.${PRODUCT_MINOR}\.[0-9]+-[0-9A-Za-z][0-9A-Za-z.-]*$ ]]; then
              echo "❌ Prerelease tag must extend the current X.Y version, for example v${OLD_VERSION}.110-simurgh-beta"
              exit 1
            fi
            {
              echo "changed=true"
              echo "prerelease=true"
              echo "tag=$PRERELEASE_TAG"
            } >> "$GITHUB_OUTPUT"
            echo "🧪 Prerelease tag: $PRERELEASE_TAG"
          elif [ "$OLD_VERSION" == "$NEW_VERSION" ]; then
            {
              echo "changed=false"
              echo "prerelease=false"
              echo "tag=v$NEW_VERSION"
            } >> "$GITHUB_OUTPUT"
            echo "⏭️  No version change needed"
          else
            {
              echo "changed=true"
              echo "prerelease=false"
              echo "tag=v$NEW_VERSION"
            } >> "$GITHUB_OUTPUT"
            echo "🎉 Version changed: $OLD_VERSION → $NEW_VERSION"
          fi

      - name: Generate release notes
        if: steps.version_check.outputs.changed == 'true'
        id: release_notes
        env:
          RELEASE_TAG_OVERRIDE: ${{ steps.version_check.outputs.tag }}
        run: |
          python3 tools/generate_release_notes.py > release_notes.md
          echo "✅ Release notes generated"

      - name: Commit version bump
        if: steps.version_check.outputs.changed == 'true' && steps.version_check.outputs.prerelease != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION CHANGELOG.md src/__init__.py app/dashboard/drone-dashboard/package.json app/dashboard/drone-dashboard/src/version.js
          git commit -m "chore: bump version to ${{ steps.bump_version.outputs.version }}" -m "Automated version bump" -m "Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push

      - name: Create Git tag
        if: steps.version_check.outputs.changed == 'true'
        run: |
          TAG="${{ steps.version_check.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "❌ Tag already exists: $TAG"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "🏷️  Created tag: $TAG"

      - name: Create GitHub Release
        if: steps.version_check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version_check.outputs.tag }}
          name: ${{ steps.version_check.outputs.tag }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ steps.version_check.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: steps.version_check.outputs.changed == 'true'
        run: |
          {
            echo "## ✅ Release Complete!"
            echo ""
            echo "**Product version:** v${{ steps.bump_version.outputs.version }}"
            echo "**Tag:** \`${{ steps.version_check.outputs.tag }}\`"
            echo "**Prerelease:** ${{ steps.version_check.outputs.prerelease }}"
            echo ""
            echo "🔗 [View Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.version_check.outputs.tag }})"
          } >> "$GITHUB_STEP_SUMMARY"
