name: Automated Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Manual version (e.g., 3.8) or leave empty for auto'
        required: false
        default: ''
      bump_type:
        description: 'Auto bump type if version empty'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - minor
          - major

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio pytest-cov pytest-mock pytest-timeout hypothesis

      - name: Validate generated contracts
        run: |
          python3 tools/generate_mds_env_reference.py --check
          python3 tools/generate_simurgh_tool_candidates.py --check
          python3 tools/generate_simurgh_docs_index.py --check
          python3 tools/audit_mds_env_registry.py

      - name: Run Simurgh and validation safety tests
        run: |
          pytest \
            tests/test_agent_assistant_evals.py \
            tests/test_agent_assistant_runtime.py \
            tests/test_agent_provider_smoke.py \
            tests/test_api_route_inventory.py \
            tests/test_env_registry.py \
            tests/test_gcs_simurgh_mcp.py \
            tests/test_gcs_simurgh_routes.py \
            tests/test_mds_auth.py \
            tests/test_node_boot_status_routes.py \
            tests/test_run_sitl_validation_suite.py \
            tests/test_runtime_validation_support.py \
            tests/test_simurgh_dashboard_prompt_evals.py \
            tests/test_simurgh_mcp_smoke_client.py \
            tests/test_simurgh_retrieval_quality.py \
            tests/test_simurgh_tool_candidate_generator.py \
            tests/test_sitl_control_client.py
          python3 tools/run_simurgh_dashboard_prompt_evals.py
          python3 tools/run_simurgh_provider_smoke.py --expected-runtime-mode sitl --json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/dashboard/drone-dashboard/package-lock.json

      - name: Validate dashboard
        working-directory: app/dashboard/drone-dashboard
        run: |
          npm ci
          CI=true npm test -- --runInBand --watchAll=false --runTestsByPath \
            src/pages/SimurghOperatorPage.test.js \
            src/services/gcsApiService.test.js \
            src/config/routeDocs.test.js \
            src/components/SidebarMenu.test.js \
            src/App.test.js
          npm run build

  release:
    needs: quality-gates
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for commit analysis
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install gitpython

      - name: Get current version
        id: current_version
        run: |
          CURRENT_VERSION=$(cat VERSION)
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "📌 Current version: $CURRENT_VERSION"

      - name: Bump version
        id: bump_version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "🎯 Using manual version: ${{ github.event.inputs.version }}"
            python3 tools/bump_version.py --manual "${{ github.event.inputs.version }}"
          else
            echo "🤖 Auto-detecting version bump from commits"
            python3 tools/bump_version.py --type "${{ github.event.inputs.bump_type || 'auto' }}"
          fi

          NEW_VERSION=$(cat VERSION)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "✅ New version: $NEW_VERSION"

      - name: Check if version changed
        id: version_check
        run: |
          OLD_VERSION="${{ steps.current_version.outputs.version }}"
          NEW_VERSION="${{ steps.bump_version.outputs.version }}"

          if [ "$OLD_VERSION" == "$NEW_VERSION" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️  No version change needed"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🎉 Version changed: $OLD_VERSION → $NEW_VERSION"
          fi

      - name: Generate release notes
        if: steps.version_check.outputs.changed == 'true'
        id: release_notes
        run: |
          python3 tools/generate_release_notes.py > release_notes.md
          echo "✅ Release notes generated"

      - name: Commit version bump
        if: steps.version_check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION CHANGELOG.md src/__init__.py app/dashboard/drone-dashboard/package.json app/dashboard/drone-dashboard/src/version.js
          git commit -m "chore: bump version to ${{ steps.bump_version.outputs.version }}" -m "Automated version bump" -m "Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push

      - name: Create Git tag
        if: steps.version_check.outputs.changed == 'true'
        run: |
          git tag -a "v${{ steps.bump_version.outputs.version }}" -m "Release v${{ steps.bump_version.outputs.version }}"
          git push origin "v${{ steps.bump_version.outputs.version }}"
          echo "🏷️  Created tag: v${{ steps.bump_version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.version_check.outputs.changed == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.bump_version.outputs.version }}
          name: v${{ steps.bump_version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: steps.version_check.outputs.changed == 'true'
        run: |
          echo "## ✅ Release Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ steps.bump_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`v${{ steps.bump_version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View Release](https://github.com/${{ github.repository }}/releases/tag/v${{ steps.bump_version.outputs.version }})" >> $GITHUB_STEP_SUMMARY
