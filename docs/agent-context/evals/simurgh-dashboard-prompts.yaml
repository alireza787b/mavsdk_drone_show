version: 1
metadata:
  owner: simurgh-operator
  purpose: >
    PM-facing dashboard prompt acceptance suite. These scenarios exercise the
    actual Simurgh dashboard assistant orchestration path, including local
    read-only tools, query adaptation, and session topic memory. They do not
    call live model providers, MCP clients, drone-local APIs, or command routes.
conversations:
  - id: fleet_status_and_live_location
    provider: mock
    actor: operator
    tags: [fleet, telemetry, followup]
    turns:
      - prompt: "How many drones do we have configured?"
        expected:
          provider: mds-tools
          tool_intent: fleet_summary
          response_mode: status
          query_domain: fleet
          session_topic: fleet
          tool_ids: [mds.config.fleet.read, mds.config.positions.read, mds.config.swarm.read]
          requires_evidence: true
          evidence_source: local_read_only_mds
          evidence_summary_must_include:
            - Fleet status from GCS configuration
          must_include:
            - Fleet status from GCS configuration
            - configured drone
          must_not_include:
            - Simurgh Operator mock assistant is active
      - prompt: "what is their gps status and coordinate?"
        expected:
          provider: mds-tools
          tool_intent: fleet_connectivity
          response_mode: status
          query_domain: fleet
          session_topic: fleet
          tool_ids: [mds.fleet.telemetry.read]
          must_include:
            - Connectivity from GCS state
            - GPS
            - Latitude
            - Longitude
          must_not_include:
            - Fleet status from GCS configuration

  - id: drone_show_readiness_and_meaning
    provider: mock
    actor: operator
    tags: [drone-show, followup]
    turns:
      - prompt: "is there a drone show uploaded ready?"
        expected:
          provider: mds-tools
          tool_intent: show_summary
          response_mode: status
          query_domain: drone_show
          session_topic: drone_show
          tool_ids: [mds.shows.skybrush.read, mds.shows.skybrush.validation.read]
          must_include:
            - Loaded show state from GCS show-management files
            - Current packages
            - Readiness signals
      - prompt: "does uploaded mean it is fly ready?"
        expected:
          provider: mds-tools
          tool_intent: show_summary
          response_mode: interpret
          query_domain: drone_show
          session_topic: drone_show
          must_include:
            - Uploaded/loaded means show files exist
            - Fly-ready is stricter
            - operator must confirm

  - id: logs_status_then_interpretation
    provider: mock
    actor: operator
    tags: [logs, followup]
    turns:
      - prompt: "check latest logs tell me if there is any warning"
        expected:
          provider: mds-tools
          tool_intent: backend_log_summary
          response_mode: status
          query_domain: logs
          session_topic: logs
          tool_ids: [mds.logs.sessions.read]
          requires_evidence: true
          evidence_source: local_read_only_mds
          evidence_summary_must_include:
            - Backend warning/error summary
          must_include:
            - Backend warning/error summary
          must_not_include:
            - Simurgh capabilities
      - prompt: "what do these logs mean, should I worry?"
        expected:
          provider: mds-tools
          tool_intent: backend_log_summary
          response_mode: interpret
          query_domain: logs
          session_topic: logs
          must_include:
            - Operational interpretation
            - Short answer
          must_not_include:
            - Simurgh capabilities

  - id: drone_log_and_ulog_inventory
    provider: mock
    actor: operator
    tags: [logs, ulog, commands]
    turns:
      - prompt: "Check the logs and see if all happened was correct or not. Also do we have a ulog stored?"
        expected:
          provider: mds-tools
          tool_intent: drone_log_summary
          response_mode: status
          query_domain: logs
          session_topic: logs
          tool_ids:
            - mds.logs.drone_sessions.read
            - mds.logs.drone_ulog_files.read
          requires_evidence: true
          evidence_source: local_read_only_mds
          evidence_summary_must_include:
            - Drone log evidence
          must_include:
            - Drone log evidence
            - Recent command tracker evidence
            - ULog download
          must_not_include:
            - Simurgh Operator mock assistant is active
            - Blocked intent signals

  - id: setup_third_drone_and_scripts
    provider: mock
    actor: operator
    tags: [setup, onboarding, followup]
    turns:
      - prompt: "if I want to add a third drone now, what workflow must be done?"
        expected:
          provider: mds-tools
          tool_intent: add_drone_workflow
          response_mode: workflow
          query_domain: setup
          session_topic: setup
          must_include:
            - Add-drone workflow
            - Fleet Enrollment
            - unique fleet entry
      - prompt: "what scripts and docs should I use now?"
        expected:
          provider: mds-tools
          tool_intent: companion_setup_help
          response_mode: workflow
          query_domain: setup
          session_topic: setup
          must_include:
            - tools/install_mds_node.sh
            - tools/install_companion.sh
            - Fleet Enrollment

  - id: general_questions_do_not_inherit_fleet
    provider: mock
    actor: operator
    tags: [general, routing]
    turns:
      - prompt: "any drone connected?"
        expected:
          provider: mds-tools
          tool_intent: fleet_connectivity
          query_domain: fleet
          session_topic: fleet
          must_include:
            - Connectivity from GCS state
      - prompt: "what is a drone?"
        expected:
          provider: mds-tools
          tool_intent: general_knowledge
          response_mode: interpret
          query_domain: general
          session_topic: general
          must_include:
            - unmanned aircraft
          must_not_include:
            - Fleet status from GCS configuration
      - prompt: "how is the weather today?"
        expected:
          provider: mds-tools
          tool_intent: general_knowledge
          response_mode: interpret
          query_domain: general
          session_topic: general
          must_include:
            - live weather feed
          must_not_include:
            - Fleet status from GCS configuration

  - id: public_geography_and_distance
    provider: mock
    actor: operator
    tags: [general, geography, followup]
    turns:
      - prompt: "What is the lat long altitude of Damavand Peak in WGS84 meters?"
        expected:
          provider: mds-tools
          tool_intent: public_geography
          response_mode: interpret
          query_domain: general
          session_topic: public_geography
          tool_ids: [simurgh.public_places.read, simurgh.geodesy.calculate]
          must_include:
            - Mount Damavand peak
            - WGS84 decimal degrees
            - Elevation
      - prompt: "if I want a 10 km radius loop around it how long would that be?"
        expected:
          provider: mds-tools
          tool_intent: public_geography
          response_mode: interpret
          session_topic: public_geography
          must_include:
            - Mount Damavand peak
            - radius around the point
            - circumference

  - id: autopilot_support_is_px4_first
    provider: mock
    actor: operator
    tags: [autopilot, px4, ardupilot]
    turns:
      - prompt: "does MDS support ArduPilot or only PX4?"
        expected:
          provider: mds-tools
          tool_intent: autopilot_support
          response_mode: capability
          query_domain: general
          session_topic: general
          must_include:
            - PX4-first and PX4-validated
            - ArduPilot
            - future integration candidate

  - id: mcp_capability_followup
    provider: mock
    actor: integrator
    tags: [mcp, capabilities, followup]
    turns:
      - prompt: "What MCP tools and API capabilities can Simurgh expose?"
        expected:
          provider: mds-tools
          tool_intent: capability_catalog
          response_mode: capability
          query_domain: capabilities
          session_topic: capabilities
          must_include:
            - config/agent_tools.yaml
            - MCP endpoint
      - prompt: "can n8n use that same menu too?"
        expected:
          provider: mds-tools
          tool_intent: capability_catalog
          response_mode: capability
          query_domain: mcp
          session_topic: capabilities
          must_include:
            - tools/list
            - tools/call
            - bearer auth

  - id: runtime_environment_and_health
    provider: mock
    actor: operator
    tags: [runtime, environment, health]
    turns:
      - prompt: "what runtime and Simurgh settings are active right now?"
        expected:
          provider: mds-tools
          tool_intent: runtime_summary
          response_mode: status
          session_topic: runtime
          must_include:
            - Simurgh runtime posture
            - Circuit breaker
            - Always confirm
      - prompt: "which environment settings can I edit from the dashboard?"
        expected:
          provider: mds-tools
          tool_intent: environment_summary
          response_mode: interpret
          session_topic: runtime
          must_include:
            - MDS environment registry summary
            - Environment registry
            - Secrets stay server-side
      - prompt: "is the gcs and simurgh service healthy?"
        expected:
          provider: mds-tools
          tool_intent: system_status
          response_mode: status
          session_topic: runtime
          must_include:
            - Current GCS/Simurgh health summary
            - GCS API
            - No drone command was sent

  - id: sidecar_wifi_mavlink_status
    provider: mock
    actor: operator
    tags: [fleet-ops, sidecars, wifi, mavlink]
    turns:
      - prompt: "what is the Wi-Fi and MAVLink sidecar status for the boards?"
        expected:
          provider: mds-tools
          tool_intent: sidecar_status
          response_mode: status
          session_topic: setup
          tool_ids:
            - mds.fleet.sidecars.read
            - mds.fleet.sidecar.read
            - mds.fleet.network_details.read
            - mds.fleet.sidecars.connectivity_profile.read
          must_include:
            - Fleet Ops sidecar status
            - smart-wifi-manager
            - mavlink-anywhere
          must_not_include:
            - Fleet status from GCS configuration
      - prompt: "if Wi-Fi dashboard delete says API token required what does that mean?"
        expected:
          provider: mds-tools
          tool_intent: sidecar_status
          response_mode: status
          session_topic: setup
          must_include:
            - mutation-token configuration
            - not a MAVLink flight-control issue

  - id: command_tracker_and_git_sync
    provider: mock
    actor: operator
    tags: [commands, git, sync]
    turns:
      - prompt: "are there any active or recent commands in the GCS tracker?"
        expected:
          provider: mds-tools
          tool_intent: command_summary
          response_mode: status
          session_topic: safety
          must_include:
            - GCS command tracker summary
            - Active commands
            - read-only tracker inspection
      - prompt: "are the GCS and drone repos synced or do we need git sync?"
        expected:
          provider: mds-tools
          tool_intent: git_status_summary
          response_mode: status
          session_topic: setup
          must_include:
            - GCS repository and fleet sync status
            - Need sync
            - read-only repository inspection
      - prompt: "are any boards still initializing or stuck in git sync?"
        expected:
          provider: mds-tools
          tool_intent: node_boot_status
          response_mode: status
          session_topic: setup
          tool_ids:
            - mds.fleet.node_boot_status.read
          requires_evidence: true
          evidence_source: local_read_only_mds
          evidence_summary_must_include:
            - Fleet node boot/init status
          must_include:
            - Fleet node boot/init status
            - startup/git-sync/sidecar initialization
            - No repository sync, sidecar action, or drone command was sent

  - id: origin_and_px4_parameter_posture
    provider: mock
    actor: operator
    tags: [origin, px4, parameters]
    turns:
      - prompt: "what origin and launch positions are configured now?"
        expected:
          provider: mds-tools
          tool_intent: origin_status
          response_mode: status
          session_topic: drone_show
          must_include:
            - Origin and launch-position status
            - Configured launch/trajectory start positions
            - read-only configuration inspection
      - prompt: "what PX4 parameter profiles and policy does MDS have?"
        expected:
          provider: mds-tools
          tool_intent: px4_params_summary
          response_mode: interpret
          session_topic: safety
          must_include:
            - PX4 parameter support
            - Profiles available
            - No PX4 parameter was read from a drone

  - id: quickscout_smart_swarm_and_sitl_readiness
    provider: mock
    actor: operator
    tags: [quickscout, swarm, sitl, readiness]
    turns:
      - prompt: "is there any QuickScout SAR mission package ready or active?"
        expected:
          provider: mds-tools
          tool_intent: sar_summary
          response_mode: status
          session_topic: sar
          must_include:
            - QuickScout/SAR mission status
            - read-only QuickScout inspection
      - prompt: "is smart swarm mission ready for a field follow test?"
        expected:
          provider: mds-tools
          tool_intent: swarm_readiness
          response_mode: workflow
          session_topic: swarm
          must_include:
            - Smart Swarm readiness snapshot
            - human field checks
            - read-only readiness advisory
          must_not_include:
            - Mission reay not found
      - prompt: "how do I create a SITL demo before trying this for real?"
        expected:
          provider: mds-tools
          tool_intent: sitl_help
          response_mode: workflow
          session_topic: sitl
          must_include:
            - To go to SITL
            - /sitl-control
            - No drone command was sent
