- id: mds.shows.skybrush.metrics_snapshot.read
  title: Read SkyBrush metrics snapshot
  description: Read the current cached comprehensive metrics snapshot for the processed
    SkyBrush show package without recalculating or writing metrics.
  exposure: allow
  risk_class: sensitive_observe
  boundary: gcs
  read_only: true
  route:
    method: GET
    path: /api/v1/shows/skybrush/metrics/snapshot
  required_role: viewer
  runtime_modes:
  - read_only
  - sitl
  - real
  side_effects: []
  sensitivity:
  - mission_state
  - safety_analysis
  tags:
  - show
  - skybrush
  - metrics
  docs:
  - docs/apis/gcs-api-server.md
  - docs/features/drone-show.md
  safety_notes:
  - This route reads only the current cached metrics snapshot and does not refresh,
    import, deploy, download, plot, launch, or command a show.
  - If no current cache exists, the tool reports unavailable instead of recalculating
    through MCP.
