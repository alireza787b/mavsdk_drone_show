version: 1
metadata:
  owner: simurgh-operator
  mcp_protocol_family: '2025-11-25'
  boundary: gcs-only
  notes:
  - Drone-side APIs are explicitly excluded in this phase.
  - Raw command routes are not exposed to models or MCP clients.
  - Guarded tools require policy approval before any adapter may execute them.
tools:
- id: mds.operator.question.answer
  title: Answer operator MDS question
  description: Answer one operator question using Simurgh's read-only MDS advisory
    context, public docs, and approved GCS observations. Use this for conceptual or
    mixed MDS questions before selecting lower-level status tools.
  exposure: allow
  risk_class: observe
  boundary: gcs
  read_only: true
  required_role: viewer
  runtime_modes:
  - read_only
  - sitl
  - real
  side_effects: []
  sensitivity: []
  tags:
  - assistant
  - advisory
  - docs
  - operator
  docs:
  - docs/guides/simurgh-operator.md
  - docs/agent-context/tool-usage-guidelines.md
  safety_notes:
  - This is a read-only advisory wrapper; it does not mutate GCS state or command
    drones.
  - Direct operational actions are blocked before execution and must not be converted
    into raw API calls.
  - Prefer this tool for natural-language MDS questions; use lower-level status tools
    only when the user asks for current state.
  input_schema:
    type: object
    additionalProperties: false
    required:
    - question
    properties:
      question:
        type: string
        minLength: 1
        maxLength: 4000
        description: Natural-language MDS operator question to answer with read-only
          context.
      conversation_topic:
        type: string
        enum:
        - drone_show
        - fleet
        - swarm
        - sitl
        - setup
        - logs
        - runtime
        - capabilities
        - docs
        - general
        - mcp
        - public_geography
        - sar
        - safety
        - ui
        description: Optional safe short-lived conversation topic from dashboard chat
          session memory, used only to resolve ambiguous follow-up questions.
- id: simurgh.general_knowledge.read
  title: Read curated general operator knowledge
  description: Answer common public robotics/MDS-adjacent concepts from reviewed local
    Simurgh general-knowledge context. Use for concepts such as drone, MAVLink,
    PX4, ArduPilot, or weather-tool availability.
  exposure: allow
  risk_class: observe
  boundary: gcs
  read_only: true
  required_role: viewer
  runtime_modes:
  - read_only
  - sitl
  - real
  side_effects: []
  sensitivity: []
  tags:
  - assistant
  - general
  - knowledge
  - mcp
  docs:
  - docs/guides/simurgh-operator.md
  - docs/agent-context/operator-guidelines.md
  safety_notes:
  - Reads only curated public local knowledge; it does not inspect private runtime
    state or call external services.
  input_schema:
    type: object
    additionalProperties: false
    required:
    - question
    properties:
      question:
        type: string
        minLength: 1
        maxLength: 4000
        description: Public/general operator question to answer from curated local
          context.
- id: simurgh.public_places.read
  title: Read reviewed public place references
  description: Answer public place coordinate/elevation questions from reviewed
    local Simurgh references. This is for public geography facts only, not private
    mission coordinates.
  exposure: allow
  risk_class: observe
  boundary: gcs
  read_only: true
  required_role: viewer
  runtime_modes:
  - read_only
  - sitl
  - real
  side_effects: []
  sensitivity: []
  tags:
  - assistant
  - geography
  - mcp
  - public
  docs:
  - docs/guides/simurgh-operator.md
  safety_notes:
  - Public place references are approximate and must be verified against approved
    aviation data before any operation.
  - This tool never returns private field coordinates or mission sites.
  input_schema:
    type: object
    additionalProperties: false
    required:
    - question
    properties:
      question:
        type: string
        minLength: 1
        maxLength: 4000
        description: Public place coordinate/elevation question.
- id: simurgh.geodesy.calculate
  title: Calculate public geodesy guidance
  description: Calculate bounded public distance/orbit guidance from reviewed place
    references. This is conceptual math only, not route planning or mission upload.
  exposure: allow
  risk_class: observe
  boundary: gcs
  read_only: true
  required_role: viewer
  runtime_modes:
  - read_only
  - sitl
  - real
  side_effects: []
  sensitivity: []
  tags:
  - assistant
  - geodesy
  - mcp
  - public
  docs:
  - docs/guides/simurgh-operator.md
  safety_notes:
  - Geodesy output is public calculation guidance only; it does not create,
    upload, validate, or approve a flight route.
  input_schema:
    type: object
    additionalProperties: false
    required:
    - question
    properties:
      question:
        type: string
        minLength: 1
        maxLength: 4000
        description: Public distance/geodesy question using reviewed place names.
- id: mds.docs.search
  title: Search public MDS docs
  description: Search the generated public Simurgh/MDS documentation index and return
    bounded chunks with doc paths and dashboard route hints.
  exposure: allow
  risk_class: observe
  boundary: gcs
  read_only: true
  required_role: viewer
  runtime_modes:
  - read_only
  - sitl
  - real
  side_effects: []
  sensitivity: []
  tags:
  - docs
  - search
  - mcp
  - generated
  docs:
  - docs/agent-context/README.md
  - docs/guides/simurgh-operator.md
  safety_notes:
  - Searches only the generated public docs index sourced from context-index resources.
  - Does not embed private logs, telemetry, raw field evidence, secrets, or customer-only
    artifacts.
  - Use mds.docs.chunk.read to retrieve one bounded result chunk after search.
  input_schema:
    type: object
    additionalProperties: false
    required:
    - query
    properties:
      query:
        type: string
        minLength: 2
        maxLength: 500
        description: Public MDS documentation search query.
      limit:
        type: integer
        minimum: 1
        maximum: 8
        description: Maximum number of search results to return.
      tags:
        type: string
        minLength: 1
        maxLength: 160
        pattern: '^[A-Za-z0-9_,: .-]+$'
        description: Optional comma-separated tag filter, such as sitl, show, setup,
          logs, mcp.
      audience:
        type: string
        enum:
        - agent
        - operator
        - developer
        description: Optional audience filter for indexed public docs.
  output_schema:
    type: object
    additionalProperties: false
    required:
    - query
    - limit
    - tags
    - audience
    - source_context_index
    - index_path
    - resource_count
    - chunk_count
    - results
    properties:
      query:
        type: string
      limit:
        type: integer
      tags:
        type: array
        items:
          type: string
      audience:
        type:
        - string
        - 'null'
      source_context_index:
        type: string
      index_path:
        type: string
      resource_count:
        type: integer
      chunk_count:
        type: integer
      results:
        type: array
        items:
          type: object
          additionalProperties: false
          required:
          - id
          - resource_id
          - title
          - heading
          - path
          - route_hint
          - audience
          - summary
          - tags
          - links
          - canonical_url
          - content_hash
          - snippet
          - score
          properties:
            id:
              type: string
            resource_id:
              type: string
            title:
              type: string
            heading:
              type: string
            path:
              type: string
            route_hint:
              type:
              - string
              - 'null'
            audience:
              type: string
            summary:
              type: string
            tags:
              type: array
              items:
                type: string
            links:
              type: array
              items:
                type: string
            canonical_url:
              type: string
            content_hash:
              type: string
            snippet:
              type: string
            score:
              type: number
- id: mds.docs.chunk.read
  title: Read public MDS docs chunk
  description: Read one bounded chunk from the generated public Simurgh/MDS documentation
    index.
  exposure: allow
  risk_class: observe
  boundary: gcs
  read_only: true
  required_role: viewer
  runtime_modes:
  - read_only
  - sitl
  - real
  side_effects: []
  sensitivity: []
  tags:
  - docs
  - search
  - mcp
  - generated
  docs:
  - docs/agent-context/README.md
  - docs/guides/simurgh-operator.md
  safety_notes:
  - Reads only chunks from the generated public docs index.
  - Content is bounded by max_chars and never grants authority to execute actions.
  input_schema:
    type: object
    additionalProperties: false
    required:
    - chunk_id
    properties:
      chunk_id:
        type: string
        minLength: 1
        maxLength: 160
        pattern: ^[A-Za-z0-9_.:-]+$
        description: Chunk id returned by mds.docs.search.
      max_chars:
        type: integer
        minimum: 1
        maximum: 8000
        description: Maximum characters of chunk text to return.
  output_schema:
    type: object
    additionalProperties: false
    required:
    - chunk
    - text
    - truncated
    - max_chars
    - index_path
    properties:
      chunk:
        type: object
        additionalProperties: false
        required:
        - id
        - resource_id
        - title
        - heading
        - path
        - route_hint
        - audience
        - summary
        - tags
        - links
        - canonical_url
        - content_hash
        properties:
          id:
            type: string
          resource_id:
            type: string
          title:
            type: string
          heading:
            type: string
          path:
            type: string
          route_hint:
            type:
            - string
            - 'null'
          audience:
            type: string
          summary:
            type: string
          tags:
            type: array
            items:
              type: string
          links:
            type: array
            items:
              type: string
          canonical_url:
            type: string
          content_hash:
            type: string
      text:
        type: string
      truncated:
        type: boolean
      max_chars:
        type: integer
      index_path:
        type: string
- id: mds.system.health.read
