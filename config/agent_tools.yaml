  description: Read the GCS health endpoint for service availability.
  exposure: allow
  risk_class: observe
  boundary: gcs
  read_only: true
  route:
    method: GET
    path: /api/v1/system/health
  required_role: viewer
  runtime_modes:
  - read_only
  - sitl
  - real
  side_effects: []
  sensitivity: []
  tags:
  - system
  - health
  docs:
  - docs/apis/gcs-api-server.md
  - docs/agent-context/tool-usage-guidelines.md
  safety_notes:
  - Health checks are observational and do not imply flight readiness.
- id: mds.system.runtime_status.read
