- id: mds.logs.session.read
  title: Read one GCS log session
  description: Read bounded content from one GCS log session with optional filters.
    Use only when the operator asks for current/recent log details, not for general
    logging documentation.
  exposure: allow
  risk_class: sensitive_observe
  boundary: gcs
  read_only: true
  route:
    method: GET
    path: /api/logs/sessions/{session_id}
  required_role: viewer
  runtime_modes:
  - read_only
  - sitl
  - real
  side_effects: []
  sensitivity:
  - logs
  - deployment
  tags:
  - logs
  - diagnostics
  - typed_args
  docs:
  - docs/guides/logging-system.md
  safety_notes:
  - Session log content may include sensitive operational details and must remain
    bounded and redacted before sharing externally.
  - Do not use this for raw flight logs, ULog archives, drone-local erase/download
    actions, or private customer evidence.
  input_schema:
    type: object
    additionalProperties: false
    required:
    - session_id
    - limit
    properties:
      session_id:
        type: string
        minLength: 1
        maxLength: 128
        pattern: ^[A-Za-z0-9_.-]+$
        description: GCS log session id from mds.logs.sessions.read.
      level:
        type: string
        enum:
        - DEBUG
        - INFO
        - WARNING
        - ERROR
        - CRITICAL
        description: Optional minimum/exact log level filter supported by the log
          API.
      component:
        type: string
        minLength: 1
        maxLength: 80
        pattern: ^[A-Za-z0-9_.:-]+$
        description: Optional component/logger filter.
      limit:
        type: integer
        minimum: 1
        maximum: 200
        description: Maximum number of lines to return.
      offset:
        type: integer
        minimum: 0
        maximum: 100000
        description: Offset into the filtered session lines.
      since:
        type: string
        minLength: 1
        maxLength: 80
        pattern: ^[A-Za-z0-9:_.+TZ -]+$
        description: Optional timestamp filter passed to the log API.
- id: mds.logs.sessions.read
  title: Read log sessions
  description: Read available GCS log sessions without pulling full log content.
  exposure: allow
  risk_class: sensitive_observe
  boundary: gcs
  read_only: true
  route:
    method: GET
    path: /api/logs/sessions
  required_role: viewer
  runtime_modes:
  - read_only
  - sitl
  - real
  side_effects: []
  sensitivity:
  - logs
  - deployment
  tags:
  - logs
  - diagnostics
  docs:
  - docs/guides/logging-system.md
  safety_notes:
  - Full log content remains bounded and redacted before model exposure.
