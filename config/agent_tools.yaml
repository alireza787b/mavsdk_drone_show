- id: mds.fleet.node_boot_status.read
  title: Read fleet node boot status
  description: Read node boot/init phase reports sent by git-sync before coordinator readiness.
  exposure: allow
  risk_class: sensitive_observe
  boundary: gcs
  read_only: true
  route:
    method: GET
    path: /api/v1/fleet/node-boot-status
  required_role: viewer
  runtime_modes:
  - read_only
  - sitl
  - real
  side_effects: []
  sensitivity:
  - fleet_identity
  - topology
  tags:
  - fleet
  - presence
  - boot
  - git-sync
  docs:
  - docs/apis/gcs-api-server.md
  - docs/features/git-sync.md
  safety_notes:
  - Boot/init status is not flight readiness and must not make a drone commandable.
  - Treat stale running phases as investigation hints, not proof of current activity.
- id: mds.fleet.git_sync.read
  title: Read fleet git sync posture
  description: Read Fleet Ops git-sync status/posture for configured drones without
    dispatching dry-run or apply actions.
  exposure: allow
  risk_class: sensitive_observe
  boundary: gcs
  read_only: true
  route:
    method: GET
    path: /api/v1/fleet/git-sync
  required_role: viewer
  runtime_modes:
  - read_only
  - sitl
  - real
  side_effects: []
  sensitivity:
  - fleet_identity
  - repository
  - deployment
  tags:
  - fleet
  - git
  - sync
  - deployment
  docs:
  - docs/features/git-sync.md
  - docs/guides/fleet-ops.md
  - docs/apis/gcs-api-server.md
  safety_notes:
  - This tool reads sync posture only; it does not run dry-run, apply, pull, push,
    or dispatch UPDATE_CODE.
  - Out-of-sync evidence is an operator maintenance signal, not a flight-readiness
    approval.
