version: 1
metadata:
  owner: simurgh-operator
  mcp_protocol_family: "2025-11-25"
  boundary: gcs-only
  notes:
    - Drone-side APIs are explicitly excluded in this phase.
    - Raw command routes are not exposed to models or MCP clients.
    - Guarded tools require policy approval before any adapter may execute them.
tools:
  - id: mds.system.health.read
    title: Read GCS health
    description: Read the GCS health endpoint for service availability.
    exposure: allow
    risk_class: observe
    boundary: gcs
    read_only: true
    route:
      method: GET
      path: /api/v1/system/health
    required_role: viewer
    runtime_modes: [read_only, sitl, real]
    side_effects: []
    sensitivity: []
    tags: [system, health]
    docs: [docs/apis/gcs-api-server.md, docs/agent-context/tool-usage-guidelines.md]
    safety_notes:
      - Health checks are observational and do not imply flight readiness.

  - id: mds.system.runtime_status.read
    title: Read runtime status
    description: Read GCS runtime mode, repo, auth, and fleet-default status.
    exposure: allow
    risk_class: sensitive_observe
    boundary: gcs
    read_only: true
    route:
      method: GET
      path: /api/v1/system/runtime-status
    required_role: viewer
    runtime_modes: [read_only, sitl, real]
    side_effects: []
    sensitivity: [deployment, topology]
    tags: [system, runtime]
    docs: [docs/guides/runtime-config-sources.md, docs/agent-context/safety-policy.md]
    safety_notes:
      - Treat repo, mode, and host details as deployment-sensitive context.

  - id: mds.system.env_registry.read
    title: Read env registry
    description: Read the public environment registry metadata without raw secrets.
    exposure: allow
    risk_class: sensitive_observe
    boundary: gcs
    read_only: true
    route:
      method: GET
      path: /api/v1/system/env/registry
    required_role: viewer
    runtime_modes: [read_only, sitl, real]
    side_effects: []
    sensitivity: [configuration]
    tags: [system, configuration]
    docs: [docs/reference/mds-environment-registry.generated.md]
    safety_notes:
      - Secret values must remain redacted before exposure to models.

  - id: mds.fleet.telemetry.read
    title: Read fleet telemetry
    description: Read latest fleet telemetry from the GCS.
    exposure: allow
    risk_class: sensitive_observe
    boundary: gcs
    read_only: true
    route:
      method: GET
      path: /api/v1/fleet/telemetry
    required_role: viewer
    runtime_modes: [read_only, sitl, real]
    side_effects: []
    sensitivity: [location, fleet_identity, mission_state]
    tags: [fleet, telemetry]
    docs: [docs/apis/gcs-api-server.md, docs/agent-context/safety-policy.md]
    safety_notes:
      - Telemetry may include live coordinates and must not be published in public reports.
      - Stale telemetry is not truth for command decisions.

  - id: mds.fleet.heartbeats.read
    title: Read fleet heartbeats
    description: Read drone heartbeat and presence state as seen by the GCS.
    exposure: allow
    risk_class: sensitive_observe
    boundary: gcs
    read_only: true
    route:
      method: GET
      path: /api/v1/fleet/heartbeats
    required_role: viewer
    runtime_modes: [read_only, sitl, real]
    side_effects: []
    sensitivity: [fleet_identity, topology]
    tags: [fleet, presence]
    docs: [docs/apis/gcs-api-server.md]
    safety_notes:
      - Heartbeats indicate presence, not safety to command.

  - id: mds.fleet.network_status.read
    title: Read fleet network status
    description: Read GCS-owned network status observations for the fleet.
    exposure: allow
    risk_class: sensitive_observe
    boundary: gcs
    read_only: true
    route:
      method: GET
      path: /api/v1/fleet/network-status
    required_role: viewer
    runtime_modes: [read_only, sitl, real]
    side_effects: []
    sensitivity: [network, topology]
    tags: [fleet, network]
    docs: [docs/apis/gcs-api-server.md, docs/agent-context/safety-policy.md]
    safety_notes:
      - Network topology can be customer-sensitive.

  - id: mds.commands.recent.read
    title: Read recent commands
    description: Read recent tracked commands from GCS command history.
    exposure: allow
    risk_class: sensitive_observe
    boundary: gcs
    read_only: true
    route:
      method: GET
      path: /api/v1/commands/recent
    required_role: viewer
    runtime_modes: [read_only, sitl, real]
    side_effects: []
    sensitivity: [mission_history, fleet_identity]
    tags: [commands, audit]
    docs: [docs/apis/gcs-api-server.md, docs/agent-context/tool-usage-guidelines.md]
    safety_notes:
      - Command history is audit evidence and may contain mission-sensitive details.

  - id: mds.commands.active.read
    title: Read active commands
    description: Read active tracked commands from the GCS command tracker.
    exposure: allow
    risk_class: sensitive_observe
    boundary: gcs
    read_only: true
    route:
      method: GET
      path: /api/v1/commands/active
    required_role: viewer
    runtime_modes: [read_only, sitl, real]
    side_effects: []
    sensitivity: [mission_state, fleet_identity]
    tags: [commands, audit]
    docs: [docs/apis/gcs-api-server.md]
    safety_notes:
      - Active command state must be interpreted with live telemetry and operator context.

  - id: mds.commands.precision_move_policy.read
    title: Read precision move policy
    description: Read the GCS precision-move command policy.
    exposure: allow
    risk_class: observe
    boundary: gcs
    read_only: true
    route:
      method: GET
      path: /api/v1/commands/policy/precision-move
    required_role: viewer
    runtime_modes: [read_only, sitl, real]
    side_effects: []
    sensitivity: []
    tags: [commands, policy]
    docs: [docs/apis/gcs-api-server.md]
    safety_notes:
      - Reading command policy does not grant authority to execute commands.

  - id: mds.git.status.read
    title: Read repository status
    description: Read GCS repository status without applying sync operations.
    exposure: allow
    risk_class: sensitive_observe
    boundary: gcs
    read_only: true
    route:
      method: GET
      path: /api/v1/git/status
    required_role: viewer
    runtime_modes: [read_only, sitl, real]
    side_effects: []
    sensitivity: [repository, deployment]
    tags: [git, deployment]
    docs: [docs/features/git-sync.md, docs/guides/fleet-sync-and-secrets.md]
    safety_notes:
      - Repo URLs and branch names can reveal customer deployment information.

  - id: mds.logs.sources.read
    title: Read log sources
    description: Read available log sources without retrieving full log content.
    exposure: allow
    risk_class: sensitive_observe
    boundary: gcs
    read_only: true
    route:
      method: GET
      path: /api/logs/sources
    required_role: viewer
    runtime_modes: [read_only, sitl, real]
    side_effects: []
    sensitivity: [logs, topology]
    tags: [logs, diagnostics]
    docs: [docs/guides/logging-system.md]
    safety_notes:
      - Full log content requires redaction and size limits before model exposure.

  - id: mds.sitl.policy.read
    title: Read SITL policy
    description: Read the GCS SITL control policy and feature flags.
    exposure: allow
    risk_class: observe
    boundary: gcs
    read_only: true
    route:
      method: GET
      path: /api/v1/system/sitl/policy
    required_role: viewer
    runtime_modes: [read_only, sitl, real]
    side_effects: []
    sensitivity: []
    tags: [sitl, policy]
    docs: [docs/guides/sitl-control.md]
    safety_notes:
      - SITL policy explains simulation capability but does not authorize mutation.

  - id: mds.sitl.instances.read
    title: Read SITL instances
    description: Read current SITL instance state from the GCS.
    exposure: allow
    risk_class: sensitive_observe
    boundary: gcs
    read_only: true
    route:
      method: GET
      path: /api/v1/system/sitl/instances
    required_role: viewer
    runtime_modes: [read_only, sitl, real]
    side_effects: []
    sensitivity: [host_resources, topology]
    tags: [sitl, runtime]
    docs: [docs/guides/sitl-control.md]
    safety_notes:
      - Instance state may include host resource and port details.

  - id: mds.sar.missions.read
    title: Read SAR missions
    description: Read QuickScout/SAR mission catalog and status summaries.
    exposure: allow
    risk_class: sensitive_observe
    boundary: gcs
    read_only: true
    route:
      method: GET
      path: /api/sar/missions
    required_role: viewer
    runtime_modes: [read_only, sitl, real]
    side_effects: []
    sensitivity: [sar, location, findings, mission_state]
    tags: [sar, quickscout, missions]
    docs: [docs/quickscout.md, docs/features/mission-planning-workspace.md]
    safety_notes:
      - SAR mission data can include coordinates, findings, and handoff details.

  - id: mds.swarm_trajectories.status.read
    title: Read swarm trajectory status
    description: Read swarm trajectory processing and validation status.
    exposure: allow
    risk_class: sensitive_observe
    boundary: gcs
    read_only: true
    route:
      method: GET
      path: /api/v1/swarm-trajectories/status
    required_role: viewer
    runtime_modes: [read_only, sitl, real]
    side_effects: []
    sensitivity: [mission_assets, fleet_identity]
    tags: [swarm, trajectory]
    docs: [docs/features/smart-swarm.md, docs/apis/gcs-api-server.md]
    safety_notes:
      - Mission assets and drone assignments may be deployment-sensitive.

  - id: mds.sar.mission.plan
    title: Plan SAR mission
    description: Generate a QuickScout/SAR plan without launching drones.
    exposure: guarded
    risk_class: plan
    boundary: gcs
    read_only: false
    route:
      method: POST
      path: /api/sar/mission/plan
    required_role: operator
    requires_approval: true
    runtime_modes: [sitl]
    side_effects: [creates_planning_job]
    sensitivity: [sar, location, fleet_identity]
    tags: [sar, quickscout, planning]
    docs: [docs/quickscout.md, docs/features/mission-planning-workspace.md]
    safety_notes:
      - Planning must not silently use stale telemetry or fallback coordinates.
      - Launch, pause, resume, and abort remain separate excluded operations.
    input_schema:
      type: object
      additionalProperties: true

  - id: mds.sitl.instances.create
    title: Create SITL instance
    description: Create a new SITL instance through the GCS simulation control API.
    exposure: guarded
    risk_class: simulate
    boundary: gcs
    read_only: false
    route:
      method: POST
      path: /api/v1/system/sitl/instances
    required_role: admin
    requires_approval: true
    runtime_modes: [sitl]
    side_effects: [starts_container, allocates_ports]
    sensitivity: [host_resources, topology]
    tags: [sitl, simulation]
    docs: [docs/guides/sitl-control.md]
    safety_notes:
      - Simulation mutation is never valid in read-only mode.

  - id: mds.commands.raw_submit
    title: Raw GCS command submission
    description: Raw command submission endpoint. This is deliberately excluded from Simurgh exposure.
    exposure: exclude
    risk_class: operate
    boundary: gcs
    read_only: false
    route:
      method: POST
      path: /api/v1/commands
    required_role: operator
    requires_approval: true
    runtime_modes: []
    side_effects: [flight_command]
    sensitivity: [flight_control, fleet_identity]
    tags: [commands, excluded]
    docs: [docs/agent-context/safety-policy.md]
    safety_notes:
      - Future mission tools must use curated wrappers, never this raw endpoint.

  - id: mds.drone.commands.raw_submit
    title: Raw drone-local command submission
    description: Drone-local command submission endpoint. Direct drone MCP exposure is forbidden in this phase.
    exposure: exclude
    risk_class: operate
    boundary: drone
    read_only: false
    route:
      method: POST
      path: /api/v1/drone/commands
    required_role: operator
    requires_approval: true
    runtime_modes: []
    side_effects: [flight_command]
    sensitivity: [flight_control, fleet_identity]
    tags: [commands, drone-api, excluded]
    docs: [docs/agent-context/safety-policy.md]
    safety_notes:
      - MCP clients must not talk directly to drone-local APIs.

  - id: mds.auth.tokens.create
    title: Create API auth token
    description: Auth token creation is excluded from model-driven tooling.
    exposure: exclude
    risk_class: admin
    boundary: gcs
    read_only: false
    route:
      method: POST
      path: /api/v1/auth/tokens
    required_role: admin
    requires_approval: true
    runtime_modes: []
    side_effects: [creates_credential]
    sensitivity: [auth, credentials]
    tags: [auth, excluded]
    docs: [docs/guides/gcs-auth.md, docs/agent-context/safety-policy.md]
    safety_notes:
      - Credential creation remains a human/admin workflow.

  - id: mds.sar.mission.launch
    title: Launch SAR mission
    description: Launching a SAR mission can move real aircraft and is excluded in this foundation slice.
    exposure: exclude
    risk_class: operate
    boundary: gcs
    read_only: false
    route:
      method: POST
      path: /api/sar/mission/launch
    required_role: operator
    requires_approval: true
    runtime_modes: []
    side_effects: [flight_command, mission_launch]
    sensitivity: [sar, flight_control, location]
    tags: [sar, quickscout, excluded]
    docs: [docs/quickscout.md, docs/agent-context/safety-policy.md]
    safety_notes:
      - Real command wrappers require a later safety case and live preflight evidence.

  - id: mds.runtime.env.apply
    title: Apply runtime environment changes
    description: Runtime env apply/restart actions are excluded from model-driven tooling in this phase.
    exposure: exclude
    risk_class: admin
    boundary: gcs
    read_only: false
    route:
      method: POST
      path: /api/v1/system/env/gcs/apply
    required_role: admin
    requires_approval: true
    runtime_modes: []
    side_effects: [runtime_restart, configuration_mutation]
    sensitivity: [configuration, deployment]
    tags: [runtime, excluded]
    docs: [docs/guides/runtime-config-sources.md, docs/agent-context/safety-policy.md]
    safety_notes:
      - Runtime mutation belongs behind explicit human-admin workflows.

  - id: mds.fleet.git_sync.apply
    title: Apply fleet git sync
    description: Fleet git-sync apply can change deployed code and is excluded from this foundation slice.
    exposure: exclude
    risk_class: admin
    boundary: gcs
    read_only: false
    route:
      method: POST
      path: /api/v1/fleet/git-sync/apply
    required_role: admin
    requires_approval: true
    runtime_modes: []
    side_effects: [code_deploy, repository_mutation]
    sensitivity: [repository, deployment, fleet_identity]
    tags: [git, deployment, excluded]
    docs: [docs/features/git-sync.md, docs/agent-context/safety-policy.md]
    safety_notes:
      - Code deployment requires a separate release and rollback safety flow.

  - id: mds.ulog.erase_all
    title: Erase onboard ULog files
    description: Erasing onboard logs is destructive and excluded from model-driven tooling.
    exposure: exclude
    risk_class: destructive
    boundary: gcs
    read_only: false
    route:
      method: POST
      path: /api/logs/drone/{drone_id}/ulog/erase-all
    required_role: admin
    requires_approval: true
    destructive: true
    runtime_modes: []
    side_effects: [data_deletion]
    sensitivity: [logs, evidence]
    tags: [logs, destructive, excluded]
    docs: [docs/guides/logging-system.md, docs/agent-context/safety-policy.md]
    safety_notes:
      - Logs are operational evidence and must not be erased by an agent.
