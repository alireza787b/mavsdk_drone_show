- id: mds.config.positions.read
  title: Read launch positions
  description: Read configured fleet launch/trajectory start positions.
  exposure: allow
  risk_class: sensitive_observe
  boundary: gcs
  read_only: true
  route:
    method: GET
    path: /api/v1/config/fleet/trajectory-start-positions
  required_role: viewer
  runtime_modes:
  - read_only
  - sitl
  - real
  side_effects: []
  sensitivity:
  - fleet_identity
  - location
  tags:
  - fleet
  - geometry
  docs:
  - docs/apis/gcs-api-server.md
  - docs/features/swarm-trajectory.md
  safety_notes:
  - Configured positions can differ from live aircraft positions.
