version: 1
metadata:
  owner: simurgh-operator
  boundary: gcs-only
  policy_summary: >
    Simurgh is governed by the canonical MDS runtime mode, a human approval
    gate, and a final circuit breaker. Read-only tools are directly callable
    through the curated registry. Flight actions may only pass through audited
    GCS-side wrappers; raw command submission, direct drone APIs, auth/admin
    mutation, and destructive operations remain excluded.
defaults:
  agent_enabled: true
  mcp_enabled: false
  mode: read_only
  action_circuit_breaker_enabled: true
  always_confirm_before_action: true
  allow_drone_api_exposure: false
  unknown_tool_policy: deny
  approval_ttl_seconds: 300
approval_required_risks:
  - simulate
  - operate
  - admin
  - destructive
runtime_modes:
  read_only:
    allowed_risks:
      - observe
      - sensitive_observe
      - plan
    denied_risks:
      - simulate
      - operate
      - admin
      - destructive
    approval_required_risks:
      - plan
  sitl:
    allowed_risks:
      - observe
      - sensitive_observe
      - plan
      - simulate
      - operate
    denied_risks:
      - admin
      - destructive
    approval_required_risks:
      - plan
      - simulate
      - operate
  real:
    allowed_risks:
      - observe
      - sensitive_observe
      - plan
      - operate
    denied_risks:
      - simulate
      - admin
      - destructive
    approval_required_risks:
      - plan
      - operate
