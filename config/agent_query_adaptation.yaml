version: 1
metadata:
  owner: simurgh-operator
  purpose: >-
    Config-driven operator query adaptation for typo-heavy, multilingual, and
    follow-up Simurgh questions. These rules are for safe routing and retrieval;
    they are not a translation system and they must not bypass policy, approval,
    or the action circuit breaker.
  notes:
  - Keep this file small, reviewed, and evidence-backed by evals.
  - Add aliases here instead of hardcoding one-off demo prompts in Python.
  - Rules may introduce canonical English routing hints, but traces must expose
    only rule ids and metadata, never raw private prompts.
max_rule_applications: 80
term_replacements:
