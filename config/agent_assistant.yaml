version: 1
metadata:
  owner: simurgh-operator
  boundary: gcs-only
  purpose: >
    Provider-neutral assistant defaults for local orchestration, deterministic
    fallback responses, and external model context assembly.
provider: mock
max_message_chars: 4000
max_context_bytes: 64000
provider_instructions: >
  You are Simurgh Operator, the operator-facing assistant for the MDS GCS. Use only the
  supplied public MDS context and the operator message. Explain status, setup,
  safety boundaries, troubleshooting, and next safe checks. External provider
  calls are text-only: do not claim that you commanded drones, changed
  configuration, launched missions, uploaded plans, rebooted systems, or
  executed any external tool unless the supplied context explicitly contains a
  local guarded-action result from Simurgh/GCS. If an operational request reaches
  answer composition without a resolved local action plan, ask one concise
  clarification question or report the unresolved detail; do not replace the
  requested work with generic procedures or architecture explanations.
  For QGC, PX4, MAVLink, RTK,
  NetBird, or field-connectivity troubleshooting, prefer observation-first
  checks: vehicle identity and PX4 SYS_ID, MAVLink stream configuration, GCS
  routing path, link quality, RTK correction status, and comparison with a
  known-good vehicle. In authenticated operator chat, configured fleet IPs,
  callsigns, SYS_ID guidance, and GCS-owned status summaries are observable MDS
  state; do not refuse them as private evidence when they come from approved
  read-only tools. For factual MDS state, prefer approved read-only tool
  evidence and do not claim you cannot see it when that evidence is supplied.
  Retrieved context blocks whose ids start with `retrieved.` are public docs
  selected by Simurgh query planning; use them as supporting evidence and cite
  dashboard routes or context URLs when helpful. Use the supplied Simurgh
  language/tone profile to match the operator language and level when confidence
  is reasonable; keep MDS names, API paths, commands, and doc links exact. If the
  operator prompt is unclear, typo-heavy, silly, or partially outside MDS, still
  answer naturally:
  say what you understood, provide the closest safe MDS interpretation, and ask
  one concise clarifying question only when needed. Do not pretend certainty when
  the context is weak. For field logs or incident reports, use sanitized
  patterns only; do not ask operators to paste private logs, ULog archives, QGC
  logs, screenshots, chat exports, credentials, exact coordinates, or private
  network details into prompts, docs, commits, or eval fixtures. Do not update
  production services or deploy software from model prose. External
  provider calls never perform side effects by themselves; side effects are
  possible only when the supplied context includes an approved local
  Simurgh/GCS guarded-action result.
provider_input_template: |
  Public MDS context:
  {context_blocks}

  Operator message:
  {message}

  Return concise, practical guidance. Do not invent tool results or action
  execution that is not present in the supplied context.
default_context_resource_ids:
  - simurgh.system_guidelines
  - simurgh.operator_guidelines
  - simurgh.safety_policy
  - simurgh.tool_usage
  - simurgh.field_log_review
blocked_intent_terms:
  - arm
  - launch
  - takeoff
  - land
  - rtl
  - return to launch
  - kill
  - reboot
  - upload mission
  - start mission
  - deploy
  - update service
  - commit raw logs
  - commit private logs
  - paste private logs
sensitive_input_terms:
  - raw logs
  - private logs
  - customer logs
  - ulog archive
  - ulog excerpt
  - qgc logs
  - qgc log archive
  - companion logs
  - mavlink logs
  - raw mavlink
  - raw telemetry
  - chat export
  - netbird peer
  - netbird peer id
  - peer ids
  - exact coordinates
  - private network details
  - private repo path
  - private repository path
  - ticket id
  - device serial
  - serial number
  - screenshot
  - screenshots
  - raw log excerpt
  - pasted log
  - customer identifier
  - site identifier
  - mission name
sensitive_input_patterns:
  - label: field vehicle label
    regex: '\bCM4-\d+\b'
  - label: exact coordinate pair
    regex: '\b-?\d{1,2}\.\d{4,}\s*,\s*-?\d{1,3}\.\d{4,}\b'
  - label: private IPv4 address
    regex: '\b(?:10(?:\.\d{1,3}){3}|192\.168(?:\.\d{1,3}){2}|172\.(?:1[6-9]|2\d|3[0-1])(?:\.\d{1,3}){2})\b'
  - label: international phone-like number
    regex: '\+\d{1,3}(?:[\s().-]?\d){7,}\b'
  - label: secret assignment
    regex: '\b(?:authorization\s*:\s*bearer\s+[A-Za-z0-9._~+/=-]{8,}|(?:api[_ -]?key|token|password|secret)\s*(?::|=|\bis\b)\s*[A-Za-z0-9._~+/=-]{6,})(?=\s|$|[,;.)])'
  - label: QGroundControl log artifact
    regex: '\b(?:qgroundcontrol|qgc)\s+logs?\b'
  - label: companion log artifact
    regex: '\bcompanion\s+logs?\b'
  - label: MAVLink log artifact
    regex: '\b(?:mavlink\s+logs?|raw\s+mavlink)\b'
  - label: customer flight log artifact
    regex: '\bcustomer\b.{0,40}\bflight\s+logs?\b|\bflight\s+logs?\b.{0,40}\bcustomer\b'
  - label: private repository path
    regex: '\b(?:git@|ssh://git@|https://(?:github\.com|gitlab\.com|bitbucket\.org)/)[^\s]+(?:\.git)?\b'
  - label: ticket identifier
    regex: '\b(?:ticket|issue|case)\s*[:#-]?\s*[A-Z]{2,}-?\d{2,}\b|\b[A-Z]{2,}-\d{2,}\b'
  - label: device serial identifier
    regex: '\b(?:serial|s/n|sn)\s*[:#-]?\s*[A-Z0-9][A-Z0-9_-]{5,}\b'
  - label: raw or transferred ULog artifact
    regex: '\b(?:raw|download|upload|attach|stream|erase|delete)\b.{0,40}\bulogs?\b|\bulogs?\b.{0,40}\b(?:raw|download|upload|attach|stream|erase|delete|content)\b'
  - label: NetBird peer identifier
    regex: '\b(?:netbird\s+)?peer\s+id(?:\s*[:=]\s*|\s+)[A-Za-z0-9_-]{6,}\b'
  - label: exact timestamp
    regex: '\b\d{4}-\d{2}-\d{2}[T\s]\d{2}:\d{2}(?::\d{2})?(?:Z|[+-]\d{2}:?\d{2})?\b'
  - label: mission name
    regex: '\bmission\s+name\s*[:=]\s*[A-Za-z0-9_. -]{3,80}\b'
  - label: customer or site identifier
    regex: '\b(?:customer|site)\s+(?:name|id|identifier)\s*[:=]\s*[A-Za-z0-9_. -]{3,80}\b'
  - label: pasted log body
    regex: '(?m)^\s*(?:INFO|WARN|WARNING|ERROR|DEBUG)\b.{20,}$|^\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2}\b'
response_template:
  preamble: >
    I could not complete that request from the available live MDS context.
  blocked_action_notice: >
    I could not resolve the operation into a guarded action plan. Please clarify
    the target or intended sequence.
  sensitive_input_notice: >
    I can inspect local unified logs and derived ULog summaries, but raw field
    artifacts stay inside the GCS.
  no_action_notice: >
    Please clarify which MDS system, status, or result you want me to inspect.
  suggested_next_steps: []
providers:
  openai:
    model: gpt-5.6
    api_key_file: ""
    base_url: https://api.openai.com/v1
    timeout_seconds: 30
    max_output_tokens: 900
    reasoning_effort: medium
    text_verbosity: low
    web_search:
      enabled: false
      search_context_size: medium
      external_web_access: true
      allowed_domains: []
      blocked_domains: []
